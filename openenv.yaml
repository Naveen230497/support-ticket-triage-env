name: support-ticket-triage-env
version: "1.0.0"
description: >
  A real-world AI Support Ticket Triage and Resolution agent environment.
  An AI agent reads support tickets and performs triage actions such as
  classifying category, assigning priority, routing to teams, and drafting responses.
author: Naveen2304
email: guthikondanaveen9@gmail.com

environment:
  type: http
  port: 7860

action:
  type: object
  fields:
    action:
      type: string
      enum: [read_ticket, set_field, submit]
    parameters:
      type: object
      required: false

observation:
  type: object
  fields:
    ticket_id: {type: string}
    subject: {type: string}
    body: {type: string}
    task: {type: string}
    required_fields: {type: array}
    reward: {type: number}
    done: {type: boolean}
    task_id: {type: string}

tasks:
  - id: easy
    name: Basic Ticket Classification
    difficulty: easy
    max_steps: 5
    score_range: [0.0, 1.0]

  - id: medium
    name: Ticket Routing with SLA
    difficulty: medium
    max_steps: 8
    score_range: [0.0, 1.0]

  - id: hard
    name: Full Triage with Resolution
    difficulty: hard
    max_steps: 12
    score_range: [0.0, 1.0]

endpoints:
  step: POST /step
  reset: POST /reset
  state: GET /state
  tasks: GET /tasks
  grader: POST /grader
  baseline: POST /baseline
  health: GET /health
