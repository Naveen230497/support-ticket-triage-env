spec_version: "1.0"
name: "support-ticket-triage-env"
description: "Real-world AI Support Ticket Triage agent environment for OpenEnv"
type: "environment"
entry_point: "server.app:app"
image: "python:3.11-slim-bookworm"
port: 7860

tasks:
  - id: "easy"
    name: "Basic Ticket Classification"
    difficulty: "easy"
    description: "Classify support ticket by category and priority"
    grader: true
    grader_endpoint: "/grade"
  - id: "medium"
    name: "Ticket Routing with SLA"
    difficulty: "medium"
    description: "Route ticket to correct team and assign SLA tier"
    grader: true
    grader_endpoint: "/grade"
  - id: "hard"
    name: "Full Triage with Resolution"
    difficulty: "hard"
    description: "Classify, route, summarize, and draft initial response"
    grader: true
    grader_endpoint: "/grade"

metadata:
  author: "Naveen2304"
  real_world: true
